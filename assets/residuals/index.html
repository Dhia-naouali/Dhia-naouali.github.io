<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Chaotic Attractors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
            background: #ffffff;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.Fog(0xffffff, 100, 500);
        
        const camera = new THREE.PerspectiveCamera(
            50,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        
        // Initial camera position
        camera.position.set(120, 80, 240);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            alpha: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Enhanced lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(100, 200, 100);
        scene.add(directionalLight);
        
        // Add a subtle rim light for better depth
        const rimLight = new THREE.DirectionalLight(0xffffff, 0.3);
        rimLight.position.set(-100, -100, -100);
        scene.add(rimLight);
        
        // Attractor parameters
        const thomasParams = { b: 0.208186, dt: 0.1 };
        const rosslerParams = { a: 0.2, b: 0.2, c: 5.7, dt: 0.05 };
        const lorenzParams = { sigma: 10, rho: 28, beta: 8/3, dt: 0.005 };
        
        // Initial states
        let thomas = { x: 1.0, y: 0.0, z: 0.0 };
        let rossler = { x: 1.0, y: 0.0, z: 0.0 };
        let lorenz = { x: 1.0, y: 1.0, z: 1.0 };
        
        // Offsets for spatial separation
        const thomasOffset = new THREE.Vector3(-100, 0, -150);
        const rosslerOffset = new THREE.Vector3(150, 0, 0);
        const lorenzOffset = new THREE.Vector3(-50, 20, -0);
        
        // Rotate Rössler attractor for better view
        const rosslerRotation = new THREE.Euler(-Math.PI / 4, 0, 0);
        
        const maxPoints = 5000;
        
        // Enhanced color generation with distinct, fast-changing gradients
        function getGradientColor(t, gradientType = 'magma') {
            // Increase frequency for faster color changes
            const progress = (t * 3) % 1;
            
            if (gradientType === 'magma') {
                // Magma colormap (dark purple → bright purple → red → orange)
                const x = Math.min(1, Math.max(0, progress));
                
                if (x < 0.25) {
                    // Dark purple to bright purple
                    const t = x * 4;
                    return {
                        r: 0.1 + 0.5 * t,
                        g: 0.0 + 0.1 * t,
                        b: 0.4 + 0.3 * t
                    };
                } else if (x < 0.5) {
                    // Bright purple to magenta
                    const t = (x - 0.25) * 4;
                    return {
                        r: 0.6 + 0.3 * t,
                        g: 0.1 + 0.1 * t,
                        b: 0.7 - 0.2 * t
                    };
                } else if (x < 0.75) {
                    // Magenta to red
                    const t = (x - 0.5) * 4;
                    return {
                        r: 0.9 + 0.1 * t,
                        g: 0.2 + 0.2 * t,
                        b: 0.5 - 0.5 * t
                    };
                } else {
                    // Red to orange
                    const t = (x - 0.75) * 4;
                    return {
                        r: 1.0,
                        g: 0.4 + 0.25 * t,
                        b: 0.0
                    };
                }
            } else if (gradientType === 'coolwarm') {
                // Cool to warm colormap (red → white → blue)
                const x = Math.min(1, Math.max(0, progress));
                
                if (x < 0.5) {
                    const t = x * 2;
                    return {
                        r: 1.0,
                        g: 0.38 + 0.62 * t,
                        b: 0.08 + 0.92 * t
                    };
                } else {
                    const t = (x - 0.5) * 2;
                    return {
                        r: 1.0 - 0.77 * t,
                        g: 1.0 - 0.7 * t,
                        b: 1.0 - 0.25 * t
                    };
                }
            } else if (gradientType === 'viridis') {
                // Viridis colormap (purple → teal → yellow-green)
                const x = Math.min(1, Math.max(0, progress));
                
                if (x < 0.25) {
                    const t = x * 4;
                    return {
                        r: 0.27,
                        g: 0.0 + 0.24 * t,
                        b: 0.33 + 0.2 * t
                    };
                } else if (x < 0.5) {
                    const t = (x - 0.25) * 4;
                    return {
                        r: 0.27 - 0.04 * t,
                        g: 0.24 + 0.35 * t,
                        b: 0.53 + 0.05 * t
                    };
                } else if (x < 0.75) {
                    const t = (x - 0.5) * 4;
                    return {
                        r: 0.23 + 0.42 * t,
                        g: 0.59 + 0.15 * t,
                        b: 0.58 - 0.23 * t
                    };
                } else {
                    const t = (x - 0.75) * 4;
                    return {
                        r: 0.65 + 0.28 * t,
                        g: 0.74 + 0.19 * t,
                        b: 0.35 - 0.11 * t
                    };
                }
            } else if (gradientType === 'plasma') {
                // Plasma colormap (purple → pink → orange → yellow)
                const x = Math.min(1, Math.max(0, progress));
                
                if (x < 0.25) {
                    const t = x * 4;
                    return {
                        r: 0.05 + 0.45 * t,
                        g: 0.03,
                        b: 0.53 + 0.17 * t
                    };
                } else if (x < 0.5) {
                    const t = (x - 0.25) * 4;
                    return {
                        r: 0.5 + 0.35 * t,
                        g: 0.03 + 0.23 * t,
                        b: 0.7 - 0.1 * t
                    };
                } else if (x < 0.75) {
                    const t = (x - 0.5) * 4;
                    return {
                        r: 0.85 + 0.12 * t,
                        g: 0.26 + 0.38 * t,
                        b: 0.6 - 0.5 * t
                    };
                } else {
                    const t = (x - 0.75) * 4;
                    return {
                        r: 0.97 + 0.03 * t,
                        g: 0.64 + 0.28 * t,
                        b: 0.1 + 0.25 * t
                    };
                }
            }
            
            // Fallback to white
            return { r: 1, g: 1, b: 1 };
        }
        
        // Create advanced line system with gradient colors
        function createGradientLineSystem(offset, gradientType = 'red-orange', scale = 1, rotation = null) {
            const positions = new Float32Array(maxPoints * 3);
            const colors = new Float32Array(maxPoints * 3);
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            // Enhanced line material with better rendering
            const material = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                linewidth: 2
            });
            
            const line = new THREE.Line(geometry, material);
            
            if (rotation) {
                line.rotation.copy(rotation);
            }
            
            scene.add(line);
            
            // Create a separate trail for better visual effect
            const trailGeometry = new THREE.BufferGeometry();
            const trailPositions = new Float32Array(maxPoints * 3);
            const trailColors = new Float32Array(maxPoints * 3);
            
            trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            trailGeometry.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
            
            const trailMaterial = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.35,
                linewidth: 3
            });
            
            const trail = new THREE.Line(trailGeometry, trailMaterial);
            if (rotation) {
                trail.rotation.copy(rotation);
            }
            scene.add(trail);
            
            return { 
                geometry, 
                line, 
                trailGeometry,
                trail,
                index: 0,
                offset: offset.clone(),
                scale: scale,
                rotation: rotation,
                gradientType: gradientType,
                positions: positions,
                colors: colors,
                trailPositions: trailPositions,
                trailColors: trailColors
            };
        }
        
        // Create gradient systems with distinct colormaps
        const thomasSystem = createGradientLineSystem(thomasOffset, 'magma', 25, null);
        const rosslerSystem = createGradientLineSystem(rosslerOffset, 'coolwarm', 12, rosslerRotation);
        const lorenzSystem = createGradientLineSystem(lorenzOffset, 'plasma', 4, null);
        
        // Interactive controls
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraRotation = { theta: 0, phi: 0.3 };
        let cameraDistance = 300;
        let targetCameraRotation = { theta: 0, phi: 0.3 };
        let targetCameraDistance = 300;
        
        // Initial camera animation
        let cameraAnimationProgress = 0;
        const initialCameraPosition = {
            theta: Math.PI / 4,
            phi: Math.PI / 6,
            distance: 300
        };
        
        targetCameraRotation = { ...initialCameraPosition };
        targetCameraDistance = initialCameraPosition.distance;
        
        // Add interaction handlers
        renderer.domElement.addEventListener('mousedown', (e) => {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
            renderer.domElement.style.cursor = 'grabbing';
        });
        
        renderer.domElement.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            
            targetCameraRotation.theta -= deltaX * 0.005;
            targetCameraRotation.phi -= deltaY * 0.005;
            
            targetCameraRotation.phi = Math.max(-Math.PI / 2 + 0.1, 
                Math.min(Math.PI / 2 - 0.1, targetCameraRotation.phi));
            
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });
        
        renderer.domElement.addEventListener('mouseup', () => {
            isDragging = false;
            renderer.domElement.style.cursor = 'grab';
        });
        
        renderer.domElement.addEventListener('mouseenter', () => {
            if (!isDragging) {
                renderer.domElement.style.cursor = 'grab';
            }
        });
        
        renderer.domElement.addEventListener('mouseleave', () => {
            if (isDragging) {
                isDragging = false;
            }
            renderer.domElement.style.cursor = 'default';
        });
        
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            targetCameraDistance += e.deltaY * 0.1;
            targetCameraDistance = Math.max(150, Math.min(800, targetCameraDistance));
        }, { passive: false });
        
        // Update system with gradient colors
        function updateGradientSystem(system, state, updateFn) {
            // Update state multiple times for smoother lines
            for (let i = 0; i < 5; i++) {
                updateFn(state);
            }
            
            const i3 = system.index * 3;
            
            // Calculate position
            let pos = new THREE.Vector3(
                state.x * system.scale,
                state.y * system.scale,
                state.z * system.scale
            );
            
            if (system.rotation) {
                pos.applyEuler(system.rotation);
            }
            
            pos.add(system.offset);
            
            // Update main line
            system.positions[i3] = pos.x;
            system.positions[i3 + 1] = pos.y;
            system.positions[i3 + 2] = pos.z;
            
            // Update trail (slightly behind)
            const trailIndex = (system.index + Math.floor(maxPoints * 0.1)) % maxPoints;
            const trailI3 = trailIndex * 3;
            system.trailPositions[trailI3] = pos.x * 0.98;
            system.trailPositions[trailI3 + 1] = pos.y * 0.98;
            system.trailPositions[trailI3 + 2] = pos.z * 0.98;
            
            // Color based on progression with gradient
            const t = system.index / maxPoints;
            const color = getGradientColor(t, system.gradientType);
            
            // Main line color
            system.colors[i3] = color.r;
            system.colors[i3 + 1] = color.g;
            system.colors[i3 + 2] = color.b;
            
            // Trail color (slightly faded)
            const trailColor = getGradientColor(t * 0.9, system.gradientType);
            system.trailColors[trailI3] = trailColor.r;
            system.trailColors[trailI3 + 1] = trailColor.g;
            system.trailColors[trailI3 + 2] = trailColor.b;
            
            system.index = (system.index + 1) % maxPoints;
            
            // Update geometry draw ranges
            if (system.index === 0) {
                system.geometry.setDrawRange(0, maxPoints);
                system.trailGeometry.setDrawRange(0, maxPoints);
            } else {
                system.geometry.setDrawRange(0, system.index);
                system.trailGeometry.setDrawRange(0, system.index);
            }
            
            system.geometry.attributes.position.needsUpdate = true;
            system.geometry.attributes.color.needsUpdate = true;
            system.trailGeometry.attributes.position.needsUpdate = true;
            system.trailGeometry.attributes.color.needsUpdate = true;
        }
        
        // Attractor update functions
        const updateThomas = (s) => {
            const dx = Math.sin(s.y) - thomasParams.b * s.x;
            const dy = Math.sin(s.z) - thomasParams.b * s.y;
            const dz = Math.sin(s.x) - thomasParams.b * s.z;
            s.x += dx * thomasParams.dt;
            s.y += dy * thomasParams.dt;
            s.z += dz * thomasParams.dt;
        };
        
        const updateRossler = (s) => {
            const dx = -s.y - s.z;
            const dy = s.x + rosslerParams.a * s.y;
            const dz = rosslerParams.b + s.z * (s.x - rosslerParams.c);
            s.x += dx * rosslerParams.dt;
            s.y += dy * rosslerParams.dt;
            s.z += dz * rosslerParams.dt;
        };
        
        const updateLorenz = (s) => {
            const dx = lorenzParams.sigma * (s.y - s.x);
            const dy = s.x * (lorenzParams.rho - s.z) - s.y;
            const dz = s.x * s.y - lorenzParams.beta * s.z;
            s.x += dx * lorenzParams.dt;
            s.y += dy * lorenzParams.dt;
            s.z += dz * lorenzParams.dt;
        };
        
        // Animation loop
        let frame = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            frame++;
            
            // Smooth camera animation with easing
            const easing = 0.08;
            cameraRotation.theta += (targetCameraRotation.theta - cameraRotation.theta) * easing;
            cameraRotation.phi += (targetCameraRotation.phi - cameraRotation.phi) * easing;
            cameraDistance += (targetCameraDistance - cameraDistance) * easing;
            
            // Update camera position
            camera.position.x = cameraDistance * Math.cos(cameraRotation.phi) * Math.sin(cameraRotation.theta);
            camera.position.y = cameraDistance * Math.sin(cameraRotation.phi);
            camera.position.z = cameraDistance * Math.cos(cameraRotation.phi) * Math.cos(cameraRotation.theta);
            camera.lookAt(0, 20, 0);
            
            // Update gradient systems
            updateGradientSystem(thomasSystem, thomas, updateThomas);
            updateGradientSystem(rosslerSystem, rossler, updateRossler);
            updateGradientSystem(lorenzSystem, lorenz, updateLorenz);
            
            // Add subtle automatic rotation when not dragging (smoother)
            if (!isDragging && frame % 300 < 150) {
                scene.rotation.y += 0.0003;
                scene.rotation.x = Math.sin(frame * 0.0008) * 0.03;
            }
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Add subtle stars in the background
        function addStars() {
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 800;
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 2000;
                positions[i + 1] = (Math.random() - 0.5) * 2000;
                positions[i + 2] = (Math.random() - 0.5) * 2000;
                
                const brightness = 0.2 + Math.random() * 0.3;
                colors[i] = brightness;
                colors[i + 1] = brightness;
                colors[i + 2] = brightness;
            }
            
            starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const starMaterial = new THREE.PointsMaterial({
                vertexColors: true,
                size: 1.2,
                transparent: true,
                opacity: 0.25,
                sizeAttenuation: true
            });
            
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }
        
        addStars();
        
        // Add some floating particles for ambiance
        function addAmbientParticles() {
            const particleGeometry = new THREE.BufferGeometry();
            const particleCount = 200;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 1000;
                positions[i + 1] = (Math.random() - 0.5) * 400;
                positions[i + 2] = (Math.random() - 0.5) * 1000;
                
                // Soft pastel colors
                colors[i] = 0.8 + Math.random() * 0.2;
                colors[i + 1] = 0.8 + Math.random() * 0.2;
                colors[i + 2] = 0.9 + Math.random() * 0.1;
            }
            
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const particleMaterial = new THREE.PointsMaterial({
                vertexColors: true,
                size: 2.5,
                transparent: true,
                opacity: 0.15,
                sizeAttenuation: true
            });
            
            const particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
            
            // Animate particles
            function animateParticles() {
                const positions = particleGeometry.attributes.position.array;
                for (let i = 0; i < particleCount * 3; i += 3) {
                    positions[i + 1] += 0.05;
                    if (positions[i + 1] > 200) {
                        positions[i + 1] = -200;
                    }
                }
                particleGeometry.attributes.position.needsUpdate = true;
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }
        
        addAmbientParticles();
    </script>
</body>
</html>
