<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>World Models — enlarged manifold landscape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#ffffff;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}
#hint{
  position:fixed;top:18px;right:20px;font-family:'Courier New',monospace;
  font-size:9px;color:#aaa;letter-spacing:.13em;text-transform:uppercase;line-height:2.1;
  pointer-events:none;
}
</style>
</head>
<body>
<div id="hint">drag — rotate<br>scroll — zoom</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

/* ─── deterministic RNG ─── */
var _s=9371;
function rng(){_s=(_s*16807)%2147483647;return(_s-1)/2147483646;}

/* ─── scene: pure white background, larger manifold ─── */
var BG = 0xffffff;
var scene = new THREE.Scene();
scene.background = new THREE.Color(BG);

var W=innerWidth, H=innerHeight;
var camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 200);
camera.position.set(0,28,58);        // moved back/up to see larger scene
camera.lookAt(0,0,0);

var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

/* ═══════════════════════════════════════════════
   ENLARGED MANIFOLD — bigger extent, higher resolution
   SIZE = 36 (was 23), RES = 100 (was 78)
═══════════════════════════════════════════════ */
var RES = 100;        // finer grid for larger area
var SIZE = 36;        // half-extent: from -36 to +36

/* pre-bake per-vertex noise for static warp */
var VCOUNT = (RES+1)*(RES+1);
var noiseX = new Float32Array(VCOUNT);
var noiseZ = new Float32Array(VCOUNT);
for(var i=0;i<VCOUNT;i++){ noiseX[i]=(rng()-0.5)*0.65; noiseZ[i]=(rng()-0.5)*0.65; }

/* base positions (warped grid) */
var gx = new Float32Array(VCOUNT);
var gz = new Float32Array(VCOUNT);
for(var i=0;i<=RES;i++){
  for(var j=0;j<=RES;j++){
    var vi = i*(RES+1)+j;
    var u = (i/RES)*2-1, v = (j/RES)*2-1;
    var wu = Math.sign(u)*Math.pow(Math.abs(u),0.78);
    var wv = Math.sign(v)*Math.pow(Math.abs(v),0.78);
    gx[vi] = wu*SIZE + noiseX[vi];
    gz[vi] = wv*SIZE + noiseZ[vi];
  }
}

/* height function — same rich multi-scale waves, but adjusted amplitude to fit larger scale */
function fH(x,z,t){
  var r = Math.sqrt(x*x+z*z);
  /* damped radial ripple — scale wavelength with SIZE */
  var h = 3.8 * Math.sin(r*0.42 - t*0.18)/(1+r*0.10);
  /* anisotropic slab waves */
  h += 1.6 * Math.sin(x*0.27 + 0.9 + t*0.09)*Math.cos(z*0.23 - 0.4);
  /* diagonal ridge */
  h += 0.9 * Math.sin((x+z)*0.19 + 1.3 - t*0.12);
  /* counter-diagonal trough */
  h += 0.6 * Math.cos((x-z)*0.32 - 0.7 + t*0.07);
  /* high-freq wrinkle */
  h += 0.35 * Math.sin(x*0.95 + 0.5)*Math.sin(z*0.82 - 0.3);
  /* micro-texture */
  h += 0.15 * Math.sin(x*2.1 + z*1.6 + t*0.22);
  /* long-wavelength swell */
  h += 0.8 * Math.sin(x*0.065 - z*0.09 + t*0.06);
  /* localised bump off-centre (scaled) */
  var bx = x-7, bz = z+5, br = bx*bx+bz*bz;
  h += 2.2 * Math.exp(-br*0.028) * Math.sin(br*0.14 + t*0.20);
  /* secondary bump */
  var cx = x+9, cz = z-8, cr = cx*cx+cz*cz;
  h += 1.3 * Math.exp(-cr*0.035) * Math.cos(cr*0.18 - t*0.15);
  return h;
}

/* build segment buffer */
var SEGS  = RES*(RES+1)*2;
var VERTS = SEGS*2;
var mBuf  = new Float32Array(VERTS*3);
var mAttr = new THREE.BufferAttribute(mBuf,3);
mAttr.setUsage(THREE.DynamicDrawUsage);
var mGeo  = new THREE.BufferGeometry();
mGeo.setAttribute('position', mAttr);

var manifold = new THREE.LineSegments(mGeo,
  new THREE.LineBasicMaterial({color:0x0e0e0c, transparent:true, opacity:0.24, depthWrite:false}));
scene.add(manifold);

function updateManifold(t){
  var arr = mBuf, ptr = 0;
  /* horizontal connections */
  for(var i=0;i<=RES;i++){
    for(var j=0;j<RES;j++){
      var v0 = i*(RES+1)+j, v1 = v0+1;
      var x0 = gx[v0], z0 = gz[v0], x1 = gx[v1], z1 = gz[v1];
      arr[ptr++] = x0; arr[ptr++] = fH(x0,z0,t); arr[ptr++] = z0;
      arr[ptr++] = x1; arr[ptr++] = fH(x1,z1,t); arr[ptr++] = z1;
    }
  }
  /* vertical connections */
  for(var j=0;j<=RES;j++){
    for(var i=0;i<RES;i++){
      var v0 = i*(RES+1)+j, v1 = v0+(RES+1);
      var x0 = gx[v0], z0 = gz[v0], x1 = gx[v1], z1 = gz[v1];
      arr[ptr++] = x0; arr[ptr++] = fH(x0,z0,t); arr[ptr++] = z0;
      arr[ptr++] = x1; arr[ptr++] = fH(x1,z1,t); arr[ptr++] = z1;
    }
  }
  mAttr.needsUpdate = true;
}

/* ═══════════════════════════════════════════════
   FLOATING LINES — larger bounds, more drift room
═══════════════════════════════════════════════ */
function sampleH(x,z,t){ return fH(x,z,t) + 0.07; }

function makeSurfLine(col, opacity, nPts){
  var N = nPts || 100;   // slightly more points for larger scale
  var buf = new Float32Array((N+1)*3);
  var att = new THREE.BufferAttribute(buf,3);
  att.setUsage(THREE.DynamicDrawUsage);
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', att);
  geo.setDrawRange(0, N+1);
  var ln = new THREE.Line(geo,
    new THREE.LineBasicMaterial({color:col, transparent:true, opacity:opacity, depthWrite:false}));
  scene.add(ln);
  return {ln:ln, geo:geo, att:att, N:N, buf:buf};
}

var RED   = [0xc82020, 0xd42525, 0xaa1414];
var GRAY  = [0x080808, 0x161614, 0x252522, 0x363633, 0x484845,
             0x606060, 0x787876, 0x909090, 0xaaaaaa, 0xc4c4c2];

var surfLines = [];

function makeVib(isRed){
  return {
    eAmp:   isRed ? 0.20+rng()*0.30 : 0.07+rng()*0.20,
    eFreq:  0.12+rng()*0.42,
    ePhase: rng()*6.28,
    jPhases: null,
    jFreq:  3.2+rng()*6.5,
    jAmpXZ: isRed ? 0.16+rng()*0.24 : 0.05+rng()*0.16,
    jAmpY:  isRed ? 0.10+rng()*0.20 : 0.03+rng()*0.12,
  };
}

/* create red expressive lines */
for(var k=0;k<9;k++){
  var o = makeSurfLine(RED[k%3], 0.55+rng()*0.35);
  o.cx = (rng()-0.5)*SIZE*1.2;
  o.cz = (rng()-0.5)*SIZE*1.2;
  o.ang = rng()*Math.PI*2;
  o.len = SIZE*0.6 + rng()*SIZE*0.7;
  o.wav = 0.6+rng()*2.2;
  o.wavf = 0.08+rng()*0.22;
  o.wavp = rng()*6.28;
  o.driftX = (rng()-0.5)*0.012;
  o.driftZ = (rng()-0.5)*0.010;
  o.vib = makeVib(true);
  var jp = new Float32Array(o.N+1);
  for(var p=0;p<=o.N;p++) jp[p]=rng()*6.28;
  o.vib.jPhases = jp;
  surfLines.push(o);
}
/* create many gray subtle lines */
for(var k=0;k<48;k++){
  var o = makeSurfLine(GRAY[Math.floor(rng()*GRAY.length)], 0.04+rng()*0.44);
  o.cx = (rng()-0.5)*SIZE*1.4;
  o.cz = (rng()-0.5)*SIZE*1.4;
  o.ang = rng()*Math.PI*2;
  o.len = SIZE*0.3 + rng()*SIZE*0.85;
  o.wav = 0.1+rng()*1.5;
  o.wavf = 0.04+rng()*0.20;
  o.wavp = rng()*6.28;
  o.driftX = (rng()-0.5)*0.008;
  o.driftZ = (rng()-0.5)*0.008;
  o.vib = makeVib(false);
  var jp = new Float32Array(o.N+1);
  for(var p=0;p<=o.N;p++) jp[p]=rng()*6.28;
  o.vib.jPhases = jp;
  surfLines.push(o);
}

function updateSurfLines(t){
  surfLines.forEach(function(o, idx){
    o.cx += o.driftX;
    o.cz += o.driftZ;
    var bound = SIZE*1.45;
    if(o.cx >  bound) o.cx = -bound;
    if(o.cx < -bound) o.cx =  bound;
    if(o.cz >  bound) o.cz = -bound;
    if(o.cz < -bound) o.cz =  bound;

    var v = o.vib;
    var energy = v.eAmp * (0.5+0.5*Math.sin(t*v.eFreq+v.ePhase));
    energy *= (1+0.4*Math.abs(Math.sin(t*v.eFreq*4.3+v.ePhase*1.7)));

    var N = o.N, arr = o.buf;
    var ca = Math.cos(o.ang), sa = Math.sin(o.ang);
    var phase = t*o.wavf + o.wavp;

    for(var i=0;i<=N;i++){
      var s = (i/N-0.5)*o.len*2;
      var wx = o.wav * Math.sin(phase + s*0.16 + idx*0.38);
      var px = o.cx + ca*s - sa*wx;
      var pz = o.cz + sa*s + ca*wx;
      px = Math.max(-SIZE*1.08, Math.min(SIZE*1.08, px));
      pz = Math.max(-SIZE*1.08, Math.min(SIZE*1.08, pz));

      var jp = v.jPhases[i];
      var jx = energy * v.jAmpXZ * Math.sin(t*v.jFreq + jp);
      var jz = energy * v.jAmpXZ * Math.cos(t*v.jFreq*0.73 + jp + 1.1);
      var jy = energy * v.jAmpY  * Math.sin(t*v.jFreq*1.3 + jp + 2.4);

      arr[i*3  ] = px + jx;
      arr[i*3+1] = sampleH(px, pz, t) + jy;
      arr[i*3+2] = pz + jz;
    }
    o.att.needsUpdate = true;
    o.geo.setDrawRange(0, N+1);
  });
}

/* ─── orbit controls (smoother, larger scene) ─── */
var orbit = {theta:0.0, phi:0.42, r:56};
var os    = {theta:0.0, phi:0.42, r:56};
var btn = -1, lx=0, ly=0;
renderer.domElement.addEventListener('mousedown', function(e){ btn=e.button; lx=e.clientX; ly=e.clientY; e.preventDefault(); });
renderer.domElement.addEventListener('mousemove', function(e){
  if(btn<0) return;
  var dx = e.clientX-lx, dy = e.clientY-ly;
  lx=e.clientX; ly=e.clientY;
  if(btn===0){
    orbit.theta -= dx*0.005;
    orbit.phi = Math.max(0.05, Math.min(1.50, orbit.phi - dy*0.005));
  }
});
window.addEventListener('mouseup', function(){ btn=-1; });
renderer.domElement.addEventListener('wheel', function(e){
  orbit.r = Math.max(12, Math.min(110, orbit.r + e.deltaY*0.06));
  e.preventDefault();
}, {passive:false});
renderer.domElement.addEventListener('contextmenu', function(e){ e.preventDefault(); });
var tch = {};
renderer.domElement.addEventListener('touchstart', function(e){
  for(var i=0;i<e.changedTouches.length;i++){
    var t = e.changedTouches[i];
    tch[t.identifier] = {x:t.clientX, y:t.clientY};
  }
  e.preventDefault();
}, {passive:false});
renderer.domElement.addEventListener('touchmove', function(e){
  if(Object.keys(tch).length===1){
    var t = e.changedTouches[0];
    orbit.theta -= (t.clientX - tch[t.identifier].x)*0.005;
    orbit.phi = Math.max(0.05, Math.min(1.50, orbit.phi - (t.clientY - tch[t.identifier].y)*0.005));
    tch[t.identifier] = {x:t.clientX, y:t.clientY};
  }
  e.preventDefault();
}, {passive:false});
renderer.domElement.addEventListener('touchend', function(e){
  for(var i=0;i<e.changedTouches.length;i++) delete tch[e.changedTouches[i].identifier];
}, {passive:false});

/* ─── animation loop ─── */
var clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();
  orbit.theta += 0.0006;  // very slow auto-rotation
  os.theta += (orbit.theta - os.theta)*0.07;
  os.phi   += (orbit.phi   - os.phi  )*0.07;
  os.r     += (orbit.r     - os.r    )*0.07;
  var ph = os.phi, th = os.theta, r = os.r;
  camera.position.set(r*Math.sin(ph)*Math.sin(th), r*Math.cos(ph), r*Math.sin(ph)*Math.cos(th));
  camera.lookAt(0,0,0);
  updateManifold(t);
  updateSurfLines(t);
  renderer.render(scene, camera);
}
window.addEventListener('resize', function(){
  W = innerWidth; H = innerHeight;
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
  renderer.setSize(W,H);
});
animate();
})();
</script>
</body>
</html>
