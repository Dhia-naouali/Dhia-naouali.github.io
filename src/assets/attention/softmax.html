<!DOCTYPE html>
<html>
<head>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;font-family:sans-serif}
canvas{display:block;width:100%}
#ctrl{padding:7px 14px 10px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.st .sl{font-size:10px;color:#888;margin-bottom:1px}
.st .sv{font-size:12px;font-family:monospace;font-weight:500;color:var(--color-text-primary,#111)}
#msg{font-size:11px;font-family:monospace;margin-left:auto;text-align:right}
@media(prefers-color-scheme:dark){.st .sv{color:#ddd}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ctrl">
  <div class="st"><div class="sl">new logit</div><div class="sv" id="vd">5.00</div></div>
  <div class="st"><div class="sl">placed max</div><div class="sv" id="vpm" style="color:#185FA5">9.10</div></div>
  <div class="st"><div class="sl">online max</div><div class="sv" id="vm">9.10</div></div>
  <div class="st"><div class="sl">cf = exp(prev − new max)</div><div class="sv" id="vc">1.0000</div></div>
  <span id="msg">drag the 4th bar on the right ↕</span>
</div>

<script>
const PLACED      = [3.1, 7.4, 9.1];
const PLACED_MAX  = 9.1;
const INIT_DRAG   = 5.0;
const MAX_SCORE   = 12;

let dragVal  = INIT_DRAG;
let dragging = false, hoverDrag = false;

const CW = 680, CH = 300;
const dpr = Math.min(devicePixelRatio || 1, 2);
const cv = document.getElementById('cv');
const g  = cv.getContext('2d');
cv.width  = CW*dpr; cv.height = CH*dpr;
cv.style.width = CW+'px'; cv.style.height = CH+'px';
g.scale(dpr, dpr);

const dark = matchMedia('(prefers-color-scheme:dark)').matches;
const TC  = dark ? 'rgba(212,209,194,.9)'  : 'rgba(33,33,31,.9)';
const TC2 = dark ? 'rgba(212,209,194,.36)' : 'rgba(33,33,31,.3)';

/* palette */
const BLUE   = '#185FA5';   /* placed bars */
const RED    = '#E24B4A';   /* new/draggable bar */
const BLUE_D = '#0C447C';   /* darker blue for text on light fills */
const RED_L  = '#F09595';   /* lighter red for correction blend */

/* correction tint: blue bars blend toward red as cf drops */
function cfCol(cf) {
  const t = Math.max(0, 1 - cf);
  const b = [24, 95, 165], r = [226, 75, 74];
  const mix = (a, b, t) => Math.round(a + (b-a)*t);
  return `rgb(${mix(b[0],r[0],t)},${mix(b[1],r[1],t)},${mix(b[2],r[2],t)})`;
}

/* layout */
const LX = 18, RX = 362, PW = 300;
const BW = 40, BG = 10, NB = 4;
const BOFF = (PW - (NB*BW + (NB-1)*BG)) / 2;
const RH = 42, RS = 72;
const RY = [26, 26+RS, 26+2*RS, 26+3*RS];

const bx = (px, i) => px + BOFF + i*(BW+BG);
const rx = (px)    => px + BOFF + NB*BW + (NB-1)*BG + 8;

function txt(s, x, y, col, al, fnt) {
  g.fillStyle = col || TC2;
  g.font = fnt || '10px monospace';
  g.textAlign = al || 'left';
  g.fillText(s, x, y);
}
function barUp(x, ry, fr, col) {
  const h = Math.max(1.5, fr*RH);
  g.fillStyle = col;
  g.fillRect(x, ry+RH-h, BW, h);
}
function barDown(x, ry, fr, col) {
  const h = Math.max(1.5, fr*RH);
  g.fillStyle = col;
  g.fillRect(x, ry, BW, h);
}
function hline(px, y, col, dsh) {
  g.strokeStyle = col; g.lineWidth = 1.4;
  g.setLineDash(dsh || []);
  g.beginPath();
  g.moveTo(px+BOFF-6, y); g.lineTo(px+BOFF+NB*(BW+BG)-BG+6, y);
  g.stroke(); g.setLineDash([]);
}
function arrow(px, ry, lbl) {
  const cx = px+PW/2, y1 = ry+RH+4, y2 = ry+RS-5;
  g.strokeStyle = TC2; g.lineWidth = 0.7; g.setLineDash([]);
  g.beginPath(); g.moveTo(cx, y1); g.lineTo(cx, y2-7); g.stroke();
  g.fillStyle = TC2;
  g.beginPath(); g.moveTo(cx-3,y2-9); g.lineTo(cx+3,y2-9); g.lineTo(cx,y2-1); g.fill();
  txt(lbl, cx, (y1+y2)/2+4, TC2, 'center', '10px monospace');
}
function rhdr(px, ry, s) {
  txt(s, px, ry-6, TC2, 'left', '10px sans-serif');
}

/* ── compute ── */
function stdState(dv) {
  const all = [...PLACED, dv];
  const m   = Math.max(...all);
  const sh  = all.map(x => x - m);
  const ex  = sh.map(Math.exp);
  const sum = ex.reduce((a,b) => a+b, 0);
  return { m, sh, ex, nrm: ex.map(x => x/sum) };
}
function onlState(dv) {
  const nm   = Math.max(PLACED_MAX, dv);
  const isNew = dv > PLACED_MAX;
  const cf   = isNew ? Math.exp(PLACED_MAX - nm) : 1.0;
  const ev   = [...PLACED.map(x => Math.exp(x - nm)), Math.exp(dv - nm)];
  const sum  = ev.reduce((a,b) => a+b, 0);
  return { nm, isNew, cf, ev, nrm: ev.map(x => x/sum) };
}

/* ── standard panel (frozen at INIT_DRAG) ── */
function drawStd(px) {
  const dv = INIT_DRAG;
  const { m, sh, ex, nrm } = stdState(dv);
  const all = [...PLACED, dv];

  txt('standard softmax', px+PW/2, 12, TC, 'center', '500 12px sans-serif');
  txt('(fixed at new logit = '+dv.toFixed(1)+')', px+PW/2, 23, TC2, 'center', '9px sans-serif');

  /* row 0 */
  rhdr(px, RY[0], 'logits');
  for (let i = 0; i < 4; i++) {
    barUp(bx(px,i), RY[0], all[i]/MAX_SCORE, i===3 ? RED : BLUE);
    txt(all[i].toFixed(1), bx(px,i)+BW/2, RY[0]-3, i===3?RED:TC2, 'center', '10px monospace');
  }
  const mly = RY[0]+RH - m/MAX_SCORE*RH;
  hline(px, mly, RED, [5,4]);
  txt('max='+m.toFixed(1), rx(px), mly+4, RED);

  arrow(px, RY[0], '− max ('+m.toFixed(1)+')');

  /* row 1 */
  rhdr(px, RY[1], 'logits − max');
  hline(px, RY[1], RED, []);
  txt('0', rx(px), RY[1]+4, RED);
  for (let i = 0; i < 4; i++) {
    if (sh[i] < 0) barDown(bx(px,i), RY[1], Math.abs(sh[i])/MAX_SCORE, i===3?RED:BLUE);
    txt(sh[i].toFixed(2), bx(px,i)+BW/2, RY[1]+RH+12, i===3?RED:TC2, 'center', '9px monospace');
  }

  arrow(px, RY[1], 'exp(·)');

  /* row 2 */
  rhdr(px, RY[2], 'exp( logits − max )');
  for (let i = 0; i < 4; i++) {
    barUp(bx(px,i), RY[2], Math.max(0.001, ex[i]), i===3?RED:BLUE);
  }
  txt('max bar always = 1.0', px+PW/2, RY[2]+RH+12, TC2, 'center', '9px monospace');

  arrow(px, RY[2], '÷ sum');

  /* row 3 */
  rhdr(px, RY[3], 'softmax output');
  const mx = Math.max(...nrm);
  for (let i = 0; i < 4; i++) {
    barUp(bx(px,i), RY[3], nrm[i]/mx, i===3?RED:BLUE);
    txt(nrm[i].toFixed(3), bx(px,i)+BW/2, RY[3]+RH+12, i===3?RED:TC2, 'center', '9px monospace');
  }
}

/* ── online panel (live) ── */
function drawOnl(px, dv) {
  const { nm, isNew, cf, ev, nrm } = onlState(dv);
  const pc = cfCol(cf);

  txt('online softmax', px+PW/2, 12, TC, 'center', '500 12px sans-serif');
  txt('(drag bar ↕ to set new logit)', px+PW/2, 23, TC2, 'center', '9px sans-serif');

  /* row 0 */
  rhdr(px, RY[0], 'logits');
  for (let i = 0; i < 3; i++) {
    barUp(bx(px,i), RY[0], PLACED[i]/MAX_SCORE, BLUE);
    txt(PLACED[i].toFixed(1), bx(px,i)+BW/2, RY[0]-3, TC2, 'center', '10px monospace');
  }
  const dh  = dv/MAX_SCORE;
  const bh  = Math.max(1.5, dh*RH);
  barUp(bx(px,3), RY[0], dh, RED);
  txt(dv.toFixed(2), bx(px,3)+BW/2, RY[0]-3, RED, 'center', '500 10px monospace');

  /* drag handle */
  const topY = RY[0]+RH-bh;
  const hx   = bx(px,3)+BW/2;
  g.fillStyle = hoverDrag ? '#A32D2D' : RED;
  g.beginPath(); g.moveTo(hx-5, topY); g.lineTo(hx+5, topY); g.lineTo(hx, topY-7); g.fill();
  g.strokeStyle = RED; g.lineWidth = 1.2; g.setLineDash([3,3]);
  g.strokeRect(bx(px,3), topY, BW, bh);
  g.setLineDash([]);

  /* max lines */
  const mly  = RY[0]+RH - nm/MAX_SCORE*RH;
  const pmly = RY[0]+RH - PLACED_MAX/MAX_SCORE*RH;
  if (isNew) {
    hline(px, pmly, BLUE, [3,3]);
    txt('prev='+PLACED_MAX.toFixed(1), rx(px), pmly-4, BLUE);
    hline(px, mly, RED, [5,4]);
    txt('max='+nm.toFixed(2), rx(px), mly+10, RED);
  } else {
    hline(px, mly, BLUE, [5,4]);
    txt('max='+nm.toFixed(1), rx(px), mly+4, BLUE);
  }

  arrow(px, RY[0], '− max ('+nm.toFixed(2)+')');

  /* row 1 */
  rhdr(px, RY[1], 'logits − max');
  hline(px, RY[1], isNew?RED:BLUE, []);
  txt('0', rx(px), RY[1]+4, isNew?RED:BLUE);
  const allS = [...PLACED, dv];
  for (let i = 0; i < 4; i++) {
    const sv = allS[i] - nm;
    if (sv < 0) barDown(bx(px,i), RY[1], Math.abs(sv)/MAX_SCORE, i===3?RED:pc);
    txt(sv.toFixed(2), bx(px,i)+BW/2, RY[1]+RH+12, i===3?RED:TC2, 'center', '9px monospace');
  }

  arrow(px, RY[1], 'exp(·)');

  /* row 2 */
  rhdr(px, RY[2], 'exp( logits − max )');
  for (let i = 0; i < 4; i++) {
    barUp(bx(px,i), RY[2], Math.max(0.001, ev[i]), i===3?RED:pc);
  }
  if (isNew) {
    const x0 = bx(px,0)-2, x1 = bx(px,2)+BW+2, by2 = RY[2]+RH+4;
    g.strokeStyle = pc; g.lineWidth = 0.9; g.setLineDash([]);
    g.beginPath();
    g.moveTo(x0,by2); g.lineTo(x0,by2+5);
    g.moveTo(x0,by2+5); g.lineTo(x1,by2+5);
    g.moveTo(x1,by2); g.lineTo(x1,by2+5);
    g.stroke();
    txt('× '+cf.toFixed(4), (x0+x1)/2, by2+16, pc, 'center', '500 9px monospace');
  }

  arrow(px, RY[2], '÷ sum');

  /* row 3 */
  rhdr(px, RY[3], 'softmax output');
  const mx = Math.max(...nrm);
  for (let i = 0; i < 4; i++) {
    barUp(bx(px,i), RY[3], nrm[i]/mx, i===3?RED:BLUE);
    txt(nrm[i].toFixed(3), bx(px,i)+BW/2, RY[3]+RH+12, i===3?RED:TC2, 'center', '9px monospace');
  }
}

/* ── render ── */
function render() {
  g.clearRect(0, 0, CW, CH);
  g.strokeStyle = TC2; g.lineWidth = 0.5; g.setLineDash([4,3]);
  g.beginPath(); g.moveTo(340,6); g.lineTo(340,CH-6); g.stroke();
  g.setLineDash([]);
  drawStd(LX);
  drawOnl(RX, dragVal);
  cv.style.cursor = hoverDrag ? 'ns-resize' : 'default';
}

function updateUI() {
  const { nm, isNew, cf } = onlState(dragVal);
  document.getElementById('vd').textContent = dragVal.toFixed(2);
  document.getElementById('vm').textContent = nm.toFixed(2);
  document.getElementById('vc').textContent = isNew
    ? 'exp('+PLACED_MAX.toFixed(1)+'−'+nm.toFixed(2)+') = '+cf.toFixed(4)
    : '1.0000';
  const msg = document.getElementById('msg');
  msg.textContent = isNew
    ? 'new max → blue bars shift toward red, × '+cf.toFixed(4)
    : 'below placed max — no correction needed';
  msg.style.color = isNew ? RED : '#888';
}

render(); updateUI();

/* ── drag ── */
function toCanvas(e) {
  const r = cv.getBoundingClientRect();
  const sx = CW/r.width, sy = CH/r.height;
  return {
    x: ((e.touches?e.touches[0].clientX:e.clientX)-r.left)*sx,
    y: ((e.touches?e.touches[0].clientY:e.clientY)-r.top)*sy
  };
}
function yToVal(cy) {
  return Math.max(0.1, Math.min(MAX_SCORE, (RY[0]+RH-cy)/RH*MAX_SCORE));
}
function inZone(cx, cy) {
  const x0=bx(RX,3)-12, x1=bx(RX,3)+BW+12, y0=RY[0]-14, y1=RY[0]+RH+6;
  return cx>=x0&&cx<=x1&&cy>=y0&&cy<=y1;
}

cv.addEventListener('mousedown', e => { const {x,y}=toCanvas(e); if(inZone(x,y)){dragging=true;e.preventDefault();} });
cv.addEventListener('mousemove', e => {
  const {x,y}=toCanvas(e); const was=hoverDrag; hoverDrag=inZone(x,y);
  if(dragging){dragVal=yToVal(y);updateUI();}
  if(dragging||hoverDrag!==was) render();
});
cv.addEventListener('mouseup',    ()=>{dragging=false;});
cv.addEventListener('mouseleave', ()=>{dragging=false;hoverDrag=false;render();});
cv.addEventListener('touchstart', e=>{ const {x,y}=toCanvas(e); if(inZone(x,y)){dragging=true;e.preventDefault();} },{passive:false});
cv.addEventListener('touchmove',  e=>{ if(!dragging)return; const {x,y}=toCanvas(e); dragVal=yToVal(y); updateUI();render();e.preventDefault(); },{passive:false});
cv.addEventListener('touchend',   ()=>dragging=false);
</script>
</body>
</html>
